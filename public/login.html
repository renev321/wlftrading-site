<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | WLF Trading Academy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <a href="/" class="auth-logo">
      <img src="/assets/logo-wlf.png" alt="WLF Trading" />
    </a>

    <section class="auth-card">
      <p class="eyebrow">Área privada</p>
      <h1>Entrar al curso</h1>
      <p class="muted">
        Inicia sesión con el mismo correo que fue activado para tu acceso.
      </p>

      <div class="auth-buttons">
        <button class="btn primary full" id="googleLogin">Entrar con Google</button>
        <button class="btn ghost full" id="facebookLogin">Entrar con Facebook</button>
      </div>

      <p class="small muted">
        Si todavía no tienes acceso, primero debes solicitarlo y confirmar el pago.
      </p>

      <a class="text-link" href="/">Volver al inicio</a>
    </section>
  </main>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
